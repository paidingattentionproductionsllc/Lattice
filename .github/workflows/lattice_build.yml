name: Lattice Unified Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
      
      - name: Run Lattice Unified
        run: python -u lattice_unified.py
      
      - name: Upload Lattice Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lattice-build-${{ github.run_number }}
          path: |
            *.zip.part*
            azl_manifest.json
          retention-days: 90
