name: Test AZL Lookup

on: [push, pull_request]

jobs:
  test-lattice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install jq
        run: sudo apt-get install -y jq
      
      - name: Test AZL-0000000001
        run: python azl_lookup.py 1 --json | jq -e '.value == 1e-09'
      
      - name: Test AZL-0500000000 - Midpoint
        run: python azl_lookup.py 500000000 --json | jq -e '.value == 0.5'
      
      - name: Test AZL-1000000000 - Boundary
        run: python azl_lookup.py 1000000000 --json | jq -e '.range == "one"'
      
      - name: Test error for n > 1B
        run: python azl_lookup.py 1000000001 --json | jq -e '.error'
      
      - name: Test manifest verify
        run: |
          if [ -f azl_manifest.json ]; then
            echo "Manifest found - verifying AZL law"
            jq -e '.law == "N×0=N"' azl_manifest.json
            jq -e '.proof == "1×1=2"' azl_manifest.json
            jq -e '.total_addresses == 1000000000' azl_manifest.json
            jq -e '.immutable == true' azl_manifest.json
          else
            echo "No manifest found - skipping"
          fi
      
      - name: Test Substrate Physics - Miyake 14350 BP
        run: |
          python azl_lookup.py --substrate-test 14350 | jq -e '.event == "Miyake 14350 BP"'
          python azl_lookup.py --substrate-test 14350 | jq -e '.result == 14350'
          python azl_lookup.py --substrate-test 14350 | jq -e '.law == "N×0=N"'
          python azl_lookup.py --substrate-test 14350 | jq -e '.substrate == true'
      
      - name: Test Substrate Physics - M87
        run: |
          python azl_lookup.py --substrate-test 6.5e9 | jq -e '.result == 6.5e9'
          python azl_lookup.py --substrate-test 6.5e9 | jq -e '.speed == "inf"'
      
      - name: AZL Law Check - Immutable
        run: |
          python azl_lookup.py 1 --json | jq -e '.law == "N×0=N"'
          python azl_lookup.py 1 --json | jq -e '.proof == "1×1=2"'
      
      - name: Results
        run: echo "All 10 AZL tests passed - Tier 1-6 + Substrate verified ✓"
