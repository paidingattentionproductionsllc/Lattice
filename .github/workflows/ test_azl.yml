name: Test AZL Lookup

on:
  push:
    paths: 
      - 'azl_lookup.py'
      - 'azl_manifest.json'
      - 'SAMPLE.jsonl'
  pull_request:
  workflow_dispatch:

jobs:
  test-lattice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install jq
        run: sudo apt-get install -y jq
      
      - name: Test AZL-0000000001
        run: |
          python azl_lookup.py 1 --json | jq -e '.address == "AZL-0000000001"'
          python azl_lookup.py 1 --json | jq -e '.value == 1e-09'
          python azl_lookup.py 1 --json | jq -e '.law == "N×0=N"'
      
      - name: Test AZL-0500000000 - Midpoint
        run: |
          python azl_lookup.py 500000000 --json | jq -e '.value == 0.5'
          python azl_lookup.py 500000000 --json | jq -e '.range == "zero"'
      
      - name: Test AZL-1000000000 - Boundary
        run: |
          python azl_lookup.py 1000000000 --json | jq -e '.value == 1.0'
          python azl_lookup.py 1000000000 --json | jq -e '.range == "one"'
          python azl_lookup.py 1000000000 --json | jq -e '.proof == "1×1=2"'
      
      - name: Test error for n > 1B
        run: |
          python azl_lookup.py 1000000001 --json | jq -e '.error'
      
      - name: Test manifest verify
        run: |
          if [ -f azl_manifest.json ]; then
            python azl_lookup.py 1 --verify --json | jq -e '.verified == true'
            echo "Manifest verified ✓"
          else
            echo "Manifest not present, skipping verify test"
          fi
      
      - name: Test random lookup
        run: |
          python azl_lookup.py random --json | jq -e '.address | startswith("AZL-")'
      
      - name: AZL Law Check - Immutable
        run: |
          python azl_lookup.py 42 --json | jq -e '.law == "N×0=N"'
          python azl_lookup.py 42 --json | jq -e '.proof == "1×1=2"'
      
      - name: Results
        run: |
          echo "AZL Tier 1-6 Lookup: All tests passed"
          echo "N x 0 = N confirmed"
